<!-- docs/index.html -->
<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Random Twitch Clips</title>
    <style>
        html, body { margin: 0; width: 100%; height: 100%; background: #07050d; overflow: hidden; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { display: flex; flex-direction: column; }

        header {
            height: 64px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(169, 112, 255, 0.22), rgba(255, 79, 216, 0.16)), rgba(18, 12, 34, 0.72);
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 8px 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            background: rgba(7, 5, 13, 0.5);
            color: #f5efff;
            font-size: 1.02rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            line-height: 1;
        }

        .badge {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #a970ff, #ff4fd8);
        }

        iframe { width: 100%; flex: 1; min-height: 300px; border: 0; display: block; background: #000; }
        [hidden] { display: none !important; }
    </style>
</head>
<body>
<header>
    <div class="brand" aria-label="Clip aléatoire">
        <div class="badge">🎲</div>
        <span>Clip aléatoire</span>
    </div>
</header>

<iframe id="clipEmbed" allow="autoplay; fullscreen" allowfullscreen hidden></iframe>

<script>
    const clipEmbed = document.getElementById("clipEmbed");
    let clips = [];
    let lastClipId = null;
    let timer = null;

    function parentDomain() {
        return window.location.hostname || "localhost";
    }

    function pickRandomClip() {
        if (clips.length === 0) return null;
        if (clips.length === 1) return clips[0];

        let clip = clips[Math.floor(Math.random() * clips.length)];
        let guard = 0;
        while (clip.id === lastClipId && guard < 10) {
            clip = clips[Math.floor(Math.random() * clips.length)];
            guard += 1;
        }
        return clip;
    }

    function scheduleNext(seconds) {
        if (timer) clearTimeout(timer);
        const delayMs = Math.max(3, Math.ceil(Number(seconds) || 20)) * 1000 + 700;
        timer = setTimeout(playRandomClip, delayMs);
    }

    function playClipEmbed(clip) {
        clipEmbed.hidden = false;
        clipEmbed.src = `https://clips.twitch.tv/embed?clip=${encodeURIComponent(clip.id)}&parent=${encodeURIComponent(parentDomain())}&autoplay=true`;
    }

    function playClip(clip) {
        playClipEmbed(clip);
        lastClipId = clip.id;
        scheduleNext(clip.duration);
    }

    function playRandomClip() {
        const clip = pickRandomClip();
        if (!clip) return;
        playClip(clip);
    }

    async function init() {
        const res = await fetch(`./clips.json?t=${Date.now()}`, { cache: "no-store" });
        if (!res.ok) return;
        const data = await res.json();
        clips = Array.isArray(data.clips) ? data.clips : [];
        if (clips.length === 0) return;
        playRandomClip();
    }

    init();
</script>
</body>
</html>

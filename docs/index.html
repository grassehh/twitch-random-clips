<!-- docs/index.html -->
<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Random Twitch Clips</title>
    <style>
        :root {
            --bg: #07050d;
            --panel: rgba(18, 12, 34, 0.72);
            --panel-border: rgba(255, 255, 255, 0.12);
            --text: #f5efff;
            --muted: rgba(245, 239, 255, 0.72);
            --accent: #a970ff;
            --accent-2: #ff4fd8;
        }

        html, body { margin: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { display: flex; flex-direction: column; }

        header {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            background:
                linear-gradient(135deg, rgba(169, 112, 255, 0.22), rgba(255, 79, 216, 0.16)),
                var(--panel);
            border-bottom: 1px solid var(--panel-border);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: relative;
            z-index: 1;
        }

        header::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.18), transparent 30%),
                radial-gradient(circle at 80% 50%, rgba(255, 79, 216, 0.18), transparent 24%);
            pointer-events: none;
        }

        .brand {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 8px 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            background: rgba(7, 5, 13, 0.5);
            color: var(--text);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .badge {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #fff;
            font-weight: 700;
            font-size: 0.92rem;
            box-shadow: 0 0 0 4px rgba(169, 112, 255, 0.12);
            flex: 0 0 auto;
        }

        .title {
            display: flex;
            align-items: center;
            line-height: 1;
            font-size: 1.02rem;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        iframe {
            position: fixed;
            top: 64px;
            left: 0;
            width: 100vw;
            height: calc(100vh - 64px);
            min-height: 300px;
            border: 0;
            display: block;
            background: #000;
        }
    </style>
</head>
<body>
<header>
    <div class="brand" aria-label="Clip aléatoire">
        <div class="badge">🎲</div>
        <span class="title">Clip aléatoire</span>
    </div>
</header>

<iframe id="clip" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen></iframe>

<script>
    const clipFrame = document.getElementById("clip");
    let clips = [];
    let lastClipId = null;
    let timer = null;

    function parentDomain() {
        return window.location.hostname;
    }

    function clipParents() {
        const parents = new Set();
        const host = parentDomain();

        if (host) parents.add(host);
        if (host === "localhost" || host === "127.0.0.1") {
            parents.add("localhost");
            parents.add("127.0.0.1");
        }

        return [...parents].map((parent) => `parent=${encodeURIComponent(parent)}`).join("&");
    }

    function pickRandomClip() {
        if (clips.length === 0) return null;
        if (clips.length === 1) return clips[0];

        let clip = clips[Math.floor(Math.random() * clips.length)];
        let guard = 0;
        while (clip.id === lastClipId && guard < 10) {
            clip = clips[Math.floor(Math.random() * clips.length)];
            guard += 1;
        }
        return clip;
    }

    function scheduleNext(seconds) {
        if (timer) clearTimeout(timer);
        const delayMs = Math.max(3, Math.ceil(Number(seconds) || 20)) * 1000 + 700;
        timer = setTimeout(playRandomClip, delayMs);
    }

    function playClip(clip) {
        clipFrame.src = `https://clips.twitch.tv/embed?clip=${encodeURIComponent(clip.id)}&${clipParents()}&autoplay=true&muted=true`;
        lastClipId = clip.id;
        scheduleNext(clip.duration);
    }

    function playRandomClip() {
        const clip = pickRandomClip();
        if (!clip) return;
        playClip(clip);
    }

    async function init() {
        const res = await fetch(`./clips.json?t=${Date.now()}`, { cache: "no-store" });
        if (!res.ok) return;
        const data = await res.json();
        clips = Array.isArray(data.clips) ? data.clips : [];
        if (clips.length === 0) return;
        playRandomClip();
    }

    init();
</script>
</body>
</html>

# .github/workflows/update-clips.yml
name: Update Twitch clips JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
      TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
      TWITCH_CHANNEL_LOGIN: ${{ secrets.TWITCH_CHANNEL_LOGIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate docs/clips.json
        run: |
          python - <<'PY'
          import json
          import os
          import random
          import urllib.parse
          import urllib.request
          from datetime import datetime, timedelta, timezone

          client_id = os.environ["TWITCH_CLIENT_ID"]
          client_secret = os.environ["TWITCH_CLIENT_SECRET"]
          channel_login = os.environ["TWITCH_CHANNEL_LOGIN"]

          def req_json(url, headers=None, data=None):
            req = urllib.request.Request(url, headers=headers or {}, data=data)
            with urllib.request.urlopen(req, timeout=30) as r:
              return json.loads(r.read().decode("utf-8"))

          token_payload = urllib.parse.urlencode({
            "client_id": client_id,
            "client_secret": client_secret,
            "grant_type": "client_credentials",
          }).encode("utf-8")

          token_data = req_json("https://id.twitch.tv/oauth2/token", data=token_payload)
          access_token = token_data["access_token"]

          headers = {
            "Client-Id": client_id,
            "Authorization": f"Bearer {access_token}",
          }

          users_url = "https://api.twitch.tv/helix/users?login=" + urllib.parse.quote(channel_login)
          users_data = req_json(users_url, headers=headers)
          if not users_data.get("data"):
            raise RuntimeError("Channel not found")
          broadcaster = users_data["data"][0]
          broadcaster_id = broadcaster["id"]

          ended_at = datetime.now(timezone.utc)
          created_at_raw = broadcaster.get("created_at")
          if created_at_raw:
            created_at = datetime.fromisoformat(created_at_raw.replace("Z", "+00:00"))
          else:
            created_at = ended_at

          base = "https://api.twitch.tv/helix/clips"
          WINDOW_DAYS = 30
          OUTPUT_CLIPS_LIMIT = 100
          def iso_utc(dt):
            return dt.astimezone(timezone.utc).isoformat().replace("+00:00", "Z")

          def collect_window(started_at, ended_at, global_seen_ids):
            cursor = None
            seen_cursors = set()
            window_clips_by_id = {}

            while True:
              if cursor and cursor in seen_cursors:
                break
              if cursor:
                seen_cursors.add(cursor)

              params = {
                "broadcaster_id": broadcaster_id,
                "first": "100",
                "started_at": iso_utc(started_at),
                "ended_at": iso_utc(ended_at),
                "is_featured": "true",
              }
              if cursor:
                params["after"] = cursor

              url = base + "?" + urllib.parse.urlencode(params)
              data = req_json(url, headers=headers)

              for c in data.get("data", []):
                if not c.get("is_featured"):
                  continue
                clip_id = c.get("id")
                if not clip_id:
                  continue
                if clip_id in global_seen_ids or clip_id in window_clips_by_id:
                  continue
                window_clips_by_id[clip_id] = {
                  "id": clip_id,
                  "duration": c.get("duration", 20),
                  "title": c.get("title", ""),
                  "url": c.get("url", ""),
                  "created_at": c.get("created_at", ""),
                }
                global_seen_ids.add(clip_id)

              cursor = data.get("pagination", {}).get("cursor")
              if not cursor:
                break

            return list(window_clips_by_id.values())

          def allocate_window_quotas(window_sizes, target_total):
            if target_total <= 0:
              return [0] * len(window_sizes)

            total_available = sum(window_sizes)
            if total_available <= target_total:
              return window_sizes[:]

            quotas = []
            fractions = []
            for idx, size in enumerate(window_sizes):
              raw_quota = (target_total * size) / total_available
              base_quota = min(size, int(raw_quota))
              quotas.append(base_quota)
              fractions.append((raw_quota - base_quota, idx))

            remaining = target_total - sum(quotas)
            while remaining > 0:
              candidates = [(frac, idx) for frac, idx in fractions if quotas[idx] < window_sizes[idx]]
              if not candidates:
                break
              candidates.sort(reverse=True)
              for _, idx in candidates:
                if remaining == 0:
                  break
                if quotas[idx] >= window_sizes[idx]:
                  continue
                quotas[idx] += 1
                remaining -= 1

            return quotas

          window_clips = []
          global_seen_ids = set()
          window_start = created_at
          while window_start < ended_at:
            window_end = min(window_start + timedelta(days=WINDOW_DAYS), ended_at)
            window_clips.append(collect_window(window_start, window_end, global_seen_ids))
            window_start = window_end

          window_sizes = [len(clips_in_window) for clips_in_window in window_clips]
          target_total = min(OUTPUT_CLIPS_LIMIT, sum(window_sizes))
          quotas = allocate_window_quotas(window_sizes, target_total)

          clips = []
          for idx, clips_in_window in enumerate(window_clips):
            take_count = quotas[idx]
            if take_count <= 0:
              continue
            if take_count >= len(clips_in_window):
              clips.extend(clips_in_window)
            else:
              clips.extend(random.sample(clips_in_window, take_count))

          if len(clips) < target_total:
            selected_ids = {c["id"] for c in clips}
            remaining_pool = [
              c for clips_in_window in window_clips for c in clips_in_window if c["id"] not in selected_ids
            ]
            missing = target_total - len(clips)
            if missing > 0 and remaining_pool:
              clips.extend(random.sample(remaining_pool, min(missing, len(remaining_pool))))

          random.shuffle(clips)

          out = {
            "generated_at": ended_at.isoformat().replace("+00:00", "Z"),
            "channel_login": channel_login,
            "count": len(clips),
            "clips": clips,
          }

          os.makedirs("docs", exist_ok=True)
          with open("docs/clips.json", "w", encoding="utf-8") as f:
            json.dump(out, f, ensure_ascii=False, separators=(",", ":"))
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/clips.json
          git diff --cached --quiet || git commit -m "chore: update clips.json"
          git push
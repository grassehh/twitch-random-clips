# .github/workflows/update-clips.yml
name: Update Twitch clips JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
      TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
      TWITCH_CHANNEL_LOGIN: ${{ secrets.TWITCH_CHANNEL_LOGIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate docs/clips.json
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from datetime import datetime, timedelta, timezone

          client_id = os.environ["TWITCH_CLIENT_ID"]
          client_secret = os.environ["TWITCH_CLIENT_SECRET"]
          channel_login = os.environ["TWITCH_CHANNEL_LOGIN"]

          def req_json(url, headers=None, data=None):
            req = urllib.request.Request(url, headers=headers or {}, data=data)
            with urllib.request.urlopen(req, timeout=30) as r:
              return json.loads(r.read().decode("utf-8"))

          token_payload = urllib.parse.urlencode({
            "client_id": client_id,
            "client_secret": client_secret,
            "grant_type": "client_credentials",
          }).encode("utf-8")

          token_data = req_json("https://id.twitch.tv/oauth2/token", data=token_payload)
          access_token = token_data["access_token"]

          headers = {
            "Client-Id": client_id,
            "Authorization": f"Bearer {access_token}",
          }

          users_url = "https://api.twitch.tv/helix/users?login=" + urllib.parse.quote(channel_login)
          users_data = req_json(users_url, headers=headers)
          if not users_data.get("data"):
            raise RuntimeError("Channel not found")
          broadcaster = users_data["data"][0]
          broadcaster_id = broadcaster["id"]

          ended_at = datetime.now(timezone.utc)
          created_at_raw = broadcaster.get("created_at")
          if created_at_raw:
            created_at = datetime.fromisoformat(created_at_raw.replace("Z", "+00:00"))
          else:
            created_at = ended_at

          base = "https://api.twitch.tv/helix/clips"
          def iso_utc(dt):
            return dt.astimezone(timezone.utc).isoformat().replace("+00:00", "Z")

          def collect_window(started_at, ended_at, clips_by_id):
            cursor = None
            seen_cursors = set()

            while True:
              if cursor and cursor in seen_cursors:
                break
              if cursor:
                seen_cursors.add(cursor)

              params = {
                "broadcaster_id": broadcaster_id,
                "first": "100",
                "started_at": iso_utc(started_at),
                "ended_at": iso_utc(ended_at),
              }
              if cursor:
                params["after"] = cursor

              url = base + "?" + urllib.parse.urlencode(params)
              data = req_json(url, headers=headers)

              for c in data.get("data", []):
                thumbnail_url = c.get("thumbnail_url", "")
                video_url = ""
                if "-preview-" in thumbnail_url:
                  video_url = thumbnail_url.split("-preview-", 1)[0] + ".mp4"
                clip_id = c.get("id")
                if not clip_id:
                  continue
                clips_by_id[clip_id] = {
                  "id": clip_id,
                  "duration": c.get("duration", 20),
                  "title": c.get("title", ""),
                  "url": c.get("url", ""),
                  "thumbnail_url": thumbnail_url,
                  "video_url": video_url,
                  "created_at": c.get("created_at", ""),
                }

              cursor = data.get("pagination", {}).get("cursor")
              if not cursor:
                break

          clips_by_id = {}
          window_start = created_at
          while window_start < ended_at:
            window_end = min(window_start + timedelta(days=7), ended_at)
            collect_window(window_start, window_end, clips_by_id)
            window_start = window_end

          clips = sorted(clips_by_id.values(), key=lambda clip: clip.get("created_at", ""), reverse=True)

          out = {
            "generated_at": ended_at.isoformat().replace("+00:00", "Z"),
            "channel_login": channel_login,
            "count": len(clips),
            "clips": clips,
          }

          os.makedirs("docs", exist_ok=True)
          with open("docs/clips.json", "w", encoding="utf-8") as f:
            json.dump(out, f, ensure_ascii=False, separators=(",", ":"))
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/clips.json
          git diff --cached --quiet || git commit -m "chore: update clips.json"
          git push